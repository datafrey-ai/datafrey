[project]
name = "datafrey"
version = "0.1.0"
description = "CLI for managing Datafrey database connections and MCP servers"
license = "Apache-2.0"
requires-python = ">=3.13"
authors = [{name = "DataFrey", email = "slava@datafrey.ai"}]

dependencies = [
    "typer>=0.15,<1",
    "rich>=13.0,<15",
    "httpx>=0.27,<0.29",
    "keyring>=25.0,<27",
    "questionary>=2.1,<3",
    "cryptography>=44.0,<47",
    "PyJWT>=2.9,<3",
    "posthog>=7,<8",
    "datafrey-api",
]

[project.urls]
Homepage = "https://datafrey.ai"
Documentation = "https://docs.datafrey.ai"
Repository = "https://github.com/datafrey-ai/datafrey"

[project.scripts]
datafrey = "datafrey.cli.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
datafrey-api = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/datafrey"]
