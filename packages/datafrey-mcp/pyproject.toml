[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "datafrey-mcp"
version = "0.1.0"
description = "MCP server bridge for datafrey Agent API"
license = "Apache-2.0"
requires-python = ">=3.13"
authors = [{name = "DataFrey", email = "slava@datafrey.ai"}]

dependencies = [
    "fastmcp>=2.0",
    "httpx>=0.27",
    "PyJWT[crypto]>=2.9",
    "datafrey-api>=0.1",
]

[project.urls]
Homepage = "https://datafrey.ai"
Documentation = "https://docs.datafrey.ai"
Repository = "https://github.com/datafrey-ai/datafrey"

[project.scripts]
datafrey-mcp = "datafrey_mcp.__main__:main"

[tool.uv.sources]
datafrey-api = { workspace = true }
